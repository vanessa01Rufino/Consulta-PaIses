<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🌎 Consulta de Países 🌎</title>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

  <div class="app-container">
    <h1>🌎 Consulta de Países 🌎</h1>

    <div class="search-box">
      <input type="text" id="pais" placeholder="Digite o país (ex: brazil)">
      <button onclick="buscarPais()">Buscar</button>
    </div>

    <div class="search-box">
      <select id="regiao">
        <option value="">Filtrar por região</option>
        <option value="africa">África</option>
        <option value="americas">Américas</option>
        <option value="asia">Ásia</option>
        <option value="europe">Europa</option>
        <option value="oceania">Oceania</option>
      </select>
      <button onclick="buscarRegiao()">Filtrar</button>
    </div>
🌎 
    <div id="preview-container"></div>

    <hr>

    <h2> Histórico</h2>
    <table border="1">
      <thead>
        <tr>
          <th>Bandeira</th>
          <th>País</th>
          <th>Capital</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

  </div>

  <script src="script.js"></script>
</body>
</html>
